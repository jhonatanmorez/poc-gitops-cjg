name: "Enterprise GitOps Flow"

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      run_ansible:
        description: '¿Ejecutar Ansible después de Terraform?'
        type: boolean
        default: true

permissions:
  id-token: write
  contents: read

jobs:
  plan_and_rfc:
    name: "Plan e IA RFC"
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS (OIDC)
        id: aws-creds
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::005104643423:role/GitHubActionsRole
          aws-region: us-east-1
          output-credentials: true

      - name: Terraform Plan
        run: |
          terraform init -reconfigure
          terraform plan -out=tfplan
          terraform show -no-color tfplan > tf.txt
        working-directory: gitops/terraform
        env:
          AWS_ACCESS_KEY_ID: ${{ steps.aws-creds.outputs.aws-access-key-id }}
          AWS_SECRET_ACCESS_KEY: ${{ steps.aws-creds.outputs.aws-secret-access-key }}
          AWS_SESSION_TOKEN: ${{ steps.aws-creds.outputs.aws-session-token }}
          AWS_REGION: us-east-1

      - name: IA Generate RFC
        run: |
          cp gitops/terraform/tf.txt .
          python3 gitops/scripts/generate_rfc.py

      - name: Convert RFC to Word
        run: |
          sudo apt-get update && sudo apt-get install -y pandoc
          pandoc RFC.md -o RFC_Cambio_Infra.docx --metadata title="Reporte de Cambio de Infraestructura"

      - name: Upload Word Artifact
        uses: actions/upload-artifact@v4
        with:
          name: RFC-Word
          path: RFC_Cambio_Infra.docx

      - name: Notify Teams (Gerencial)
        run: |
          # Extraemos una vista previa del resumen generado por la IA para el gerente
          RFC_PREVIEW=$(grep -A 2 "## 📋 Resumen" RFC.md | tail -n 1 | sed 's/"/\\"/g' | cut -c1-150)
          if [ -z "$RFC_PREVIEW" ]; then RFC_PREVIEW="Revisar el reporte adjunto para más detalles."; fi

          APPROVAL_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}/approvals/production"
          
          cat <<EOF > teams_payload.json
          {
            "type": "message",
            "attachments": [
              {
                "contentType": "application/vnd.microsoft.card.adaptive",
                "content": {
                  "type": "AdaptiveCard",
                  "body": [
                    {
                      "type": "TextBlock",
                      "size": "Large",
                      "weight": "Bolder",
                      "text": "📑 Aprobación de Cambio Requerida",
                      "color": "Accent"
                    },
                    {
                      "type": "FactSet",
                      "facts": [
                        { "title": "Proyecto:", "value": "${{ github.repository }}" },
                        { "title": "Entorno:", "value": "Producción 🚀" },
                        { "title": "Autor:", "value": "${{ github.actor }}" }
                      ]
                    },
                    {
                      "type": "TextBlock",
                      "text": "📋 **Resumen del Cambio (IA):**",
                      "wrap": true
                    },
                    {
                      "type": "TextBlock",
                      "text": "$RFC_PREVIEW...",
                      "wrap": true,
                      "isSubtle": true,
                      "italic": true
                    }
                  ],
                  "actions": [
                    {
                      "type": "Action.OpenUrl",
                      "title": "✅ Aprobar Despliegue",
                      "url": "$APPROVAL_URL"
                    },
                    {
                      "type": "Action.OpenUrl",
                      "title": "🔍 Ver Detalles en GitHub",
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }
                  ],
                  "\$schema": "http://adaptivecards.io/schemas/adaptive-card.json",
                  "version": "1.4"
                }
              }
            ]
          }
          EOF
          curl -X POST -H "Content-Type: application/json" -d @teams_payload.json "${{ secrets.WEBHOOK_TEAMS }}"

  apply_and_config:
    name: "Despliegue y Configuración"
    needs: plan_and_rfc
    runs-on: self-hosted
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS (OIDC)
        id: aws-creds
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::005104643423:role/GitHubActionsRole
          aws-region: us-east-1
          output-credentials: true

      - name: Setup SSH Key
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > private_key.pem
          chmod 400 private_key.pem

      - name: Terraform Apply
        run: |
          terraform init -reconfigure
          terraform apply -auto-approve
        working-directory: gitops/terraform
        env:
          AWS_ACCESS_KEY_ID: ${{ steps.aws-creds.outputs.aws-access-key-id }}
          AWS_SECRET_ACCESS_KEY: ${{ steps.aws-creds.outputs.aws-secret-access-key }}
          AWS_SESSION_TOKEN: ${{ steps.aws-creds.outputs.aws-session-token }}
          AWS_REGION: us-east-1

      - name: Instalar Ansible AWS Collection
        run: | 
          ansible-galaxy collection install amazon.aws
          ansible-galaxy collection install community.aws
          pip3 install boto3 botocore --user

      - name: Ansible Deploy (Opcional)
        if: ${{ github.event.inputs.run_ansible == 'true' || github.event_name == 'push' }}
        run: |
          export ANSIBLE_CONFIG=./gitops/ansible/ansible.cfg
          ansible-playbook gitops/ansible/playbook.yml \
            -i gitops/ansible/aws_ec2.yml \
            --private-key ./private_key.pem \
            -e "nginx=true"
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
          AWS_ACCESS_KEY_ID: ${{ steps.aws-creds.outputs.aws-access-key-id }}
          AWS_SECRET_ACCESS_KEY: ${{ steps.aws-creds.outputs.aws-secret-access-key }}
          AWS_SESSION_TOKEN: ${{ steps.aws-creds.outputs.aws-session-token }}
          AWS_REGION: us-east-1