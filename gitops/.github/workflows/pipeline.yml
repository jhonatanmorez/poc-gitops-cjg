name: GitOps Demo

on:
  pull_request:

jobs:
  deploy:
    runs-on: self-hosted

    steps:

    - uses: actions/checkout@v3

    - name: Terraform Init
      run: terraform init
      working-directory: terraform

    - name: Terraform Plan
      run: |
        terraform plan -out=tfplan
        terraform show tfplan > tf.txt
      working-directory: terraform

    - name: RFC IA
      run: |
        cp terraform/tf.txt .
        python3 scripts/generate_rfc.py

    - name: Mostrar RFC
      run: cat RFC.md

    - name: Terraform Apply
      run: terraform apply -auto-approve
      working-directory: terraform

    - name: Ansible
      run: |
        ansible-playbook ansible/playbook.yml \
        -i ansible/inventory.yml